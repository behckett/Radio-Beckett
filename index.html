<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>رادیو بکت</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@200;300;400;600;700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0a07;
  --ink:#f2edd6;
  --ink2:#a89f88;
  --ink3:#6b6355;
  --gold:#d4a843;
  --gold2:#f0c95e;
  --gold-dim:rgba(212,168,67,.12);
  --gold-glow:rgba(212,168,67,.25);
  --surface:#141209;
  --card:#1a1710;
  --card2:#221f15;
  --border:#2a2620;
  --border2:#38332a;
  --r:14px;
  --ease:cubic-bezier(.4,0,.2,1);
}
body.light{
  --bg:#f5f0e8;
  --ink:#1a1710;
  --ink2:#5a5345;
  --ink3:#8a8070;
  --gold:#9a6f1a;
  --gold2:#c49a2a;
  --gold-dim:rgba(154,111,26,.1);
  --gold-glow:rgba(154,111,26,.2);
  --surface:#ede8dc;
  --card:#fff;
  --card2:#f5f0e6;
  --border:#ddd8cc;
  --border2:#ccc7b8;
}

html{scroll-behavior:smooth}
body{
  font-family:'Vazirmatn',Tahoma,sans-serif;
  background:var(--bg);
  color:var(--ink);
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  transition:background .35s,color .35s;
}

/* ── GRAIN TEXTURE OVERLAY ── */
body::after{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity:.025;background-size:180px;
}
body.light::after{opacity:.015}

/* ── TOPBAR ── */
.topbar{
  position:sticky;top:0;z-index:200;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;height:60px;
  background:rgba(12,10,7,.9);
  backdrop-filter:blur(24px) saturate(160%);
  -webkit-backdrop-filter:blur(24px) saturate(160%);
  border-bottom:1px solid var(--border);
}
body.light .topbar{background:rgba(245,240,232,.92)}

.logo-area{display:flex;align-items:center;gap:12px;text-decoration:none}
.logo-img{height:38px;width:auto;object-fit:contain;display:block}
.logo-text{
  font-size:.95rem;font-weight:900;color:var(--gold);
  letter-spacing:-.01em;line-height:1;
}
.logo-sub{font-size:.58rem;color:var(--ink3);font-weight:400;letter-spacing:.05em;margin-top:2px}
.logo-pulse{
  width:7px;height:7px;border-radius:50%;background:var(--gold);flex-shrink:0;
  animation:pulse 2.5s ease-in-out infinite;
}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 var(--gold-glow)}50%{box-shadow:0 0 0 8px transparent}}

.topbar-right{display:flex;gap:6px}
.tb-btn{
  width:36px;height:36px;border-radius:9px;border:1px solid var(--border2);
  background:var(--card2);color:var(--ink);cursor:pointer;
  font-size:.82rem;display:flex;align-items:center;justify-content:center;
  transition:all .2s;text-decoration:none;
}
.tb-btn:hover{border-color:var(--gold);background:var(--gold-dim);color:var(--gold);transform:translateY(-1px)}

/* ── PAGE LAYOUT ── */
.page{max-width:760px;margin:0 auto;padding:0 16px 160px;position:relative;z-index:1}

/* ── HERO ── */
.hero{padding:52px 0 40px;text-align:center}
.hero-badge{
  display:inline-flex;align-items:center;gap:7px;
  border:1px solid rgba(212,168,67,.3);
  background:rgba(212,168,67,.06);
  color:var(--gold);font-size:.68rem;font-weight:700;
  padding:5px 16px;border-radius:100px;letter-spacing:.1em;
  margin-bottom:24px;
}
.badge-dot{width:5px;height:5px;border-radius:50%;background:#ff4444;animation:pulse 1.6s infinite}
.hero-title{
  font-size:clamp(2.2rem,8vw,3.8rem);font-weight:900;
  line-height:1.08;letter-spacing:-.03em;margin-bottom:14px;
}
.hero-title .gold{
  color:transparent;
  background:linear-gradient(120deg,var(--gold),var(--gold2),#f5a623,var(--gold));
  -webkit-background-clip:text;background-clip:text;
  background-size:300% auto;animation:shimmer 4s linear infinite;
}
@keyframes shimmer{0%{background-position:0%}100%{background-position:300%}}
.hero-sub{font-size:.9rem;color:var(--ink3);font-weight:300;margin-bottom:36px;line-height:1.7}

/* ── SEARCH ── */
.search-box{
  position:relative;max-width:500px;margin:0 auto 32px;
}
.search-box input{
  width:100%;padding:13px 48px 13px 18px;
  border:1.5px solid var(--border2);border-radius:var(--r);
  background:var(--card);color:var(--ink);
  font-family:inherit;font-size:.88rem;outline:none;
  transition:all .25s;
}
.search-box input:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-dim)}
.search-box input::placeholder{color:var(--ink3)}
.search-box .s-ico{
  position:absolute;top:50%;right:16px;transform:translateY(-50%);
  color:var(--ink3);font-size:.88rem;pointer-events:none;
}

/* ── SHOW FILTER CHIPS ── */
.chips{
  display:flex;gap:8px;flex-wrap:wrap;justify-content:center;
  margin-bottom:40px;
}
.chip{
  padding:8px 18px;border-radius:100px;border:1.5px solid var(--border2);
  background:transparent;color:var(--ink3);
  font-family:inherit;font-size:.76rem;font-weight:700;
  cursor:pointer;transition:all .22s;display:flex;align-items:center;gap:6px;
  letter-spacing:.02em;
}
.chip:hover{border-color:var(--gold);color:var(--ink);background:var(--gold-dim)}
.chip.active{
  background:var(--gold);color:#0c0a07;
  border-color:var(--gold);
  box-shadow:0 4px 20px var(--gold-glow);
}
.chip-count{
  background:rgba(0,0,0,.18);border-radius:100px;
  font-size:.6rem;padding:1px 6px;
}
.chip.active .chip-count{background:rgba(0,0,0,.22)}

/* ── SHOW SECTION ── */
.show-section{margin-bottom:48px}
.show-heading{
  display:flex;align-items:center;gap:14px;
  padding:16px 20px;
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);margin-bottom:12px;
  opacity:0;transform:translateY(12px);
  transition:opacity .5s var(--ease),transform .5s var(--ease);
}
.show-heading.in{opacity:1;transform:none}
.show-icon{
  width:60px;height:60px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.7rem;flex-shrink:0;
}
.show-text .name{font-size:1rem;font-weight:900;margin-bottom:3px}
.show-text .desc{font-size:.74rem;color:var(--ink3);line-height:1.5}
.show-text .meta{display:flex;gap:10px;margin-top:7px;align-items:center}
.show-badge{
  font-size:.63rem;padding:2px 9px;border-radius:100px;
  font-weight:700;background:var(--gold-dim);
  border:1px solid rgba(212,168,67,.3);color:var(--gold);
}
.rss-link{
  font-size:.63rem;color:var(--ink3);text-decoration:none;
  border:1px solid var(--border2);border-radius:6px;padding:2px 8px;
  transition:all .2s;
}
.rss-link:hover{border-color:var(--gold);color:var(--gold)}

.eps-label{
  font-size:.6rem;font-weight:700;letter-spacing:.14em;color:var(--ink3);
  text-transform:uppercase;margin-bottom:10px;margin-top:4px;
  display:flex;align-items:center;gap:10px;
}
.eps-label::before,.eps-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── EPISODE CARD ── */
.ep{
  border:1px solid var(--border);border-radius:var(--r);
  background:var(--card);margin-bottom:8px;overflow:hidden;
  cursor:pointer;position:relative;
  opacity:0;transform:translateY(20px);
  transition:transform .28s var(--ease),box-shadow .28s,border-color .28s,opacity .01s;
}
.ep.in{animation:epIn .48s var(--ease) forwards}
@keyframes epIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.ep:hover{transform:translateY(-2px);border-color:var(--border2);box-shadow:0 8px 32px rgba(0,0,0,.4)}
.ep.active{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold),0 12px 40px rgba(0,0,0,.45)}

/* hover shimmer */
.ep::before{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at var(--mx,50%) var(--my,50%),var(--gold-dim) 0%,transparent 60%);
  opacity:0;transition:opacity .35s;
}
.ep:hover::before{opacity:1}

/* Card body */
.ep-row{display:flex;align-items:center;gap:12px;padding:14px 16px;position:relative;z-index:1}

/* Number badge */
.ep-num-badge{
  flex-shrink:0;width:40px;height:40px;border-radius:10px;
  border:1.5px solid var(--border2);background:var(--card2);
  display:flex;align-items:center;justify-content:center;
  font-size:.8rem;font-weight:900;color:var(--ink3);
  transition:all .22s;font-variant-numeric:tabular-nums;
  line-height:1;flex-direction:column;gap:0;
}
.ep-num-badge .ep-n-label{font-size:.48rem;color:var(--ink3);font-weight:400;margin-top:1px;letter-spacing:.04em}
.ep.active .ep-num-badge{border-color:var(--gold);background:var(--gold-dim);color:var(--gold)}

.ep-main{flex:1;min-width:0}
.ep-show-tag{font-size:.6rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px;opacity:.8}
.ep-title{font-size:.9rem;font-weight:700;line-height:1.4;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ep-tags{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.ep-tag{font-size:.58rem;padding:2px 7px;border-radius:100px;background:var(--card2);color:var(--ink3);border:1px solid var(--border)}
.ep-dur-tag{font-size:.6rem;color:var(--ink3);margin-right:auto}

/* Play button */
.ep-play{
  flex-shrink:0;width:44px;height:44px;border-radius:50%;
  border:1.5px solid var(--border2);background:var(--card2);color:var(--ink);
  font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .22s;
}
.ep:hover .ep-play{border-color:var(--gold);color:var(--gold)}
.ep.active .ep-play{background:var(--gold);color:#0c0a07;border-color:var(--gold);box-shadow:0 4px 16px var(--gold-glow)}

/* Waveform */
.ep-wave{display:flex;align-items:center;gap:2px;height:24px;flex-shrink:0;margin-right:4px}
.ep-wave .b{width:3px;border-radius:2px;background:var(--border2)}
.ep.active .ep-wave .b{background:var(--gold);animation:wave .75s ease-in-out infinite}
.b:nth-child(1){height:5px;animation-delay:0s}
.b:nth-child(2){height:12px;animation-delay:.07s}
.b:nth-child(3){height:20px;animation-delay:.14s}
.b:nth-child(4){height:8px;animation-delay:.05s}
.b:nth-child(5){height:16px;animation-delay:.12s}
.b:nth-child(6){height:6px;animation-delay:.09s}
@keyframes wave{0%,100%{transform:scaleY(.3)}50%{transform:scaleY(1)}}

/* ── PLAYER PANEL ── */
.ep-panel{
  overflow:hidden;max-height:0;
  transition:max-height .45s cubic-bezier(.4,0,.2,1);
  border-top:0 solid var(--border);
}
.ep.active .ep-panel{max-height:480px;border-top-width:1px}
.ep-panel-inner{padding:16px;background:var(--surface);position:relative;z-index:1}

/* Native audio player */
.native-player{display:flex;flex-direction:column;gap:14px}

.np-header{display:flex;align-items:center;gap:10px;margin-bottom:2px}
.np-art{
  width:44px;height:44px;border-radius:9px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:1.4rem;
}
.np-info .np-t{font-size:.82rem;font-weight:700;line-height:1.3;margin-bottom:2px}
.np-info .np-a{font-size:.68rem;color:var(--ink3)}
.np-status{margin-right:auto;font-size:.68rem;color:var(--gold);font-weight:700}

/* Progress */
.np-prog{display:flex;align-items:center;gap:8px}
.np-time{font-size:.62rem;color:var(--ink3);white-space:nowrap;direction:ltr;font-variant-numeric:tabular-nums;min-width:32px}
.np-bar{
  flex:1;height:5px;background:var(--border2);border-radius:100px;
  cursor:pointer;position:relative;transition:height .15s;
}
.np-bar:hover{height:8px}
.np-bar-fill{
  height:100%;border-radius:100px;width:0%;pointer-events:none;
  background:linear-gradient(90deg,var(--gold),var(--gold2));
  position:relative;transition:width .12s linear;
}
.np-bar-fill::after{
  content:'';position:absolute;left:-5px;top:50%;transform:translateY(-50%);
  width:12px;height:12px;border-radius:50%;background:var(--gold2);
  box-shadow:0 0 8px var(--gold-glow);opacity:0;transition:opacity .15s;
}
.np-bar:hover .np-bar-fill::after{opacity:1}

/* Controls */
.np-controls{display:flex;align-items:center;justify-content:center;gap:8px}
.np-btn{
  border:none;background:none;color:var(--ink3);cursor:pointer;
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.88rem;transition:all .18s;
}
.np-btn:hover{color:var(--ink);background:var(--card2)}
.np-btn.skip-label{font-size:.58rem;font-weight:700;flex-direction:column;gap:0;line-height:1;color:var(--ink3);width:38px;height:38px}
.np-btn.skip-label:hover{color:var(--gold)}
.np-btn.play-main{
  width:52px;height:52px;border-radius:50%;
  background:var(--gold);color:#0c0a07;
  font-size:1.4rem;box-shadow:0 4px 20px var(--gold-glow);
}
.np-btn.play-main:hover{transform:scale(1.07);box-shadow:0 6px 28px var(--gold-glow)}

/* Bottom controls */
.np-bottom{display:flex;align-items:center;gap:12px;justify-content:space-between}
.np-vol{display:flex;align-items:center;gap:6px}
.vol-ico{font-size:.88rem;cursor:pointer;border:none;background:none;color:var(--ink3);padding:0;transition:color .2s}
.vol-ico:hover{color:var(--gold)}
.vol-bar{
  width:68px;height:3px;background:var(--border2);border-radius:100px;
  cursor:pointer;position:relative;transition:height .15s;
}
.vol-bar:hover{height:5px}
.vol-fill{height:100%;border-radius:100px;background:var(--gold2);width:100%;pointer-events:none}
.np-right{display:flex;align-items:center;gap:6px}
.np-chip{
  font-size:.62rem;font-weight:700;border:1.5px solid var(--border2);
  border-radius:8px;padding:4px 9px;cursor:pointer;font-family:inherit;
  background:transparent;color:var(--ink3);transition:all .18s;
}
.np-chip:hover,.np-chip.on{border-color:var(--gold);color:var(--gold);background:var(--gold-dim)}

/* Spotify embed fallback */
.spotify-fb{
  border-radius:10px;overflow:hidden;
  display:none;
}
.spotify-fb.show{display:block}
.spotify-fb iframe{width:100%;height:152px;border:none;display:block}
.spotify-fb-label{
  font-size:.66rem;color:var(--ink3);text-align:center;
  padding:8px 0 4px;
}

/* ── EPISODE ACTIONS ── */
.ep-actions{
  display:none;gap:6px;padding:0 16px 14px;
}
.ep.active .ep-actions{display:flex}
.ep-action{
  flex:1;padding:8px 4px;border:1px solid var(--border);border-radius:10px;
  background:transparent;color:var(--ink3);font-family:inherit;font-size:.68rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;
  transition:all .2s;text-decoration:none;font-weight:600;
}
.ep-action:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-dim)}
.ep-action.pri{border-color:rgba(212,168,67,.35);color:var(--gold);background:var(--gold-dim)}

/* ── STICKY MINI PLAYER ── */
.stick-player{
  position:fixed;bottom:0;left:0;right:0;z-index:300;
  background:rgba(12,10,7,.96);
  backdrop-filter:blur(32px) saturate(200%);
  -webkit-backdrop-filter:blur(32px) saturate(200%);
  border-top:1px solid var(--border2);
  transform:translateY(100%);transition:transform .35s var(--ease);
  padding:10px 16px max(env(safe-area-inset-bottom,0px),12px);
}
body.light .stick-player{background:rgba(245,240,232,.97)}
.stick-player.show{transform:translateY(0)}
.sp-inner{max-width:760px;margin:0 auto}
.sp-row1{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.sp-art{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.sp-info{flex:1;min-width:0}
.sp-title{font-size:.76rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px}
.sp-meta{font-size:.62rem;color:var(--ink3)}
.sp-ctrls{display:flex;align-items:center;gap:4px}
.sp-btn{
  border:none;background:none;color:var(--ink3);cursor:pointer;
  padding:6px;border-radius:50%;font-size:.88rem;
  display:flex;align-items:center;justify-content:center;transition:all .16s;
}
.sp-btn:hover{color:var(--ink);background:var(--card2)}
.sp-btn.main{
  width:36px;height:36px;background:var(--gold);color:#0c0a07;
  border-radius:50%;font-size:1rem;
}
.sp-btn.main:hover{transform:scale(1.08)}
.sp-prog{display:flex;align-items:center;gap:6px}
.sp-time{font-size:.58rem;color:var(--ink3);direction:ltr;white-space:nowrap;font-variant-numeric:tabular-nums;min-width:28px}
.sp-bar{flex:1;height:3px;background:var(--border2);border-radius:100px;cursor:pointer;position:relative}
.sp-bar:hover{height:5px;transition:height .12s}
.sp-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--gold),var(--gold2));width:0%;pointer-events:none}

/* ── UTIL ── */
#goTop{
  position:fixed;bottom:80px;left:14px;z-index:290;
  width:40px;height:40px;border-radius:50%;border:1px solid var(--border2);
  background:var(--card);color:var(--ink3);cursor:pointer;font-size:.9rem;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(0,0,0,.3);
  opacity:0;transform:scale(.85);transition:all .28s var(--ease);pointer-events:none;
}
#goTop.show{opacity:1;transform:scale(1);pointer-events:auto}
#goTop:hover{background:var(--gold);color:#0c0a07;border-color:var(--gold)}
#toast{
  position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(10px);
  background:var(--card2);border:1px solid var(--border2);color:var(--ink);
  padding:9px 20px;border-radius:100px;font-size:.76rem;
  opacity:0;transition:all .26s var(--ease);z-index:400;pointer-events:none;
  white-space:nowrap;box-shadow:0 8px 28px rgba(0,0,0,.35);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── MOBILE ── */
@media(max-width:480px){
  .hero-title{font-size:2rem}
  .chip{font-size:.7rem;padding:7px 12px}
  .ep-action span{display:none}
  .np-bottom .np-vol{display:none}
}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--gold)}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>

<header class="topbar">
  <a class="logo-area" href="#" onclick="return false">
    <div class="logo-pulse"></div>
    <img
      id="logoImg"
      src="https://drive.google.com/uc?export=view&id=1QeMJOoddon0_aYunVj2k_7m_zD5W86Dd"
      alt="رادیو بکت"
      class="logo-img"
      onerror="this.style.display='none';document.getElementById('logoTxt').style.display='flex'"
    />
    <div id="logoTxt" style="display:none;flex-direction:column">
      <div class="logo-text">رادیو بکت</div>
      <div class="logo-sub">RADIO BECKETT</div>
    </div>
  </a>
  <div class="topbar-right">
    <button class="tb-btn" id="themeBtn" onclick="toggleTheme()" title="روشن/تاریک">🌙</button>
    <a class="tb-btn" href="https://t.me/+jgTFdaJEUzFmOGE0" target="_blank" rel="noopener" title="تلگرام">📢</a>

<script>
// ──────────────────────────────────────────
// DATA  (episodes newest first)
// ──────────────────────────────────────────
const SHOWS = {
  borideh:{

      {n:44, title:'انتری که لوطیش مرده بود',      author:'صادق چوبک',   tags:['فصل دوم','رئالیسم'], dur:'۳۱:۰۶', spotifyId:'2YdJ8kSrCgHx7A8PKgsFjl'},
      {n:43, title:'چشمهایش',                     author:'بزرگ علوی',   tags:['فصل اول','عشق'],    dur:'۲۵:۳۸', spotifyId:'27F8LlezwWVnKICa8MvcHR'},

      {n:1, title:'بوف‌کور — بخش اول', author:'صادق هدایت', tags:['هدایت','آغاز'],   dur:'۲۲:۱۰', spotifyId:'3uM3FwEOFWRECTPcuFhS1w'},

      {n:3, title:'ویکنت شقه‌شده — بخش سوم', author:'ایتالو کالوینو', tags:['دوگانگی','پایان'], dur:'۲۶:۴۰', spotifyId:'0sNbKL1qoHuiXC0t7zSEb4'},
      {n:2, title:'ویکنت شقه‌شده — بخش دوم', author:'ایتالو کالوینو', tags:['جنگ','فانتزی'],   dur:'۲۳:۱۸', spotifyId:'4VfQiKSQb7l9cMjxFKkXJH'},
      {n:1, title:'ویکنت شقه‌شده — بخش اول', author:'ایتالو کالوینو', tags:['فلسفی','آغاز'],   dur:'۲۰:۵۵', spotifyId:'7cRrmN0dCDfgJD6IbPheSa'},

    color:'#1abc9c', dim:'rgba(26,188,156,.1)',
    desc:'مرتضی مشفق کاظمی', totalEps:null,
    rss:'https://anchor.fm/s/fe7eb98c/podcast/rss',
    episodes:[
      {n:3, title:'تهران مخوف — بخش سوم', author:'مرتضی مشفق کاظمی', tags:['ماجرا','رمان'],  dur:'۳۲:۲۰', spotifyId:'6LzP0HkDmJOQgjgGKXjkbW'},
      {n:2, title:'تهران مخوف — بخش دوم', author:'مرتضی مشفق کاظمی', tags:['عشق','تاریخی'],  dur:'۲۸:۴۵', spotifyId:'3GrAVo8gHBMFxLFCJF1LmK'},
      {n:1, title:'تهران مخوف — بخش اول', author:'مرتضی مشفق کاظمی', tags:['تاریخی','آغاز'], dur:'۳۰:۰۰', spotifyId:'4aaGMKZmNRjzIMa4kZxoVb'},
    ]
  }
};

// ──────────────────────────────────────────
// STATE
// ──────────────────────────────────────────
let activeShow = 'all';
let activeKey  = null; // 'showId:n'
let searchQ    = '';
let playing    = false;
let vol        = 1;
let muted      = false;
let speedIdx   = 1;
const SPEEDS   = [0.5, 1, 1.25, 1.5, 1.75, 2];
let sleepTimer = null;
let sleepStep  = 0;
const SLEEP    = [0,15,30,45,60];

const audio = document.getElementById('audio');

// ──────────────────────────────────────────
// THEME
// ──────────────────────────────────────────
function toggleTheme(){
  const l = document.body.classList.toggle('light');
  document.getElementById('themeBtn').textContent = l ? '☀️' : '🌙';
  localStorage.setItem('rb-theme', l ? 'light' : 'dark');
}
(()=>{
  if(localStorage.getItem('rb-theme')==='light'){
    document.body.classList.add('light');
    document.getElementById('themeBtn').textContent='☀️';
  }
})();

// ──────────────────────────────────────────
// TABS / SEARCH
// ──────────────────────────────────────────
document.getElementById('chips').addEventListener('click', e=>{
  const chip = e.target.closest('.chip');
  if(!chip) return;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  chip.classList.add('active');
  activeShow = chip.dataset.show;
  render();
});
document.getElementById('searchInput').addEventListener('input', e=>{
  searchQ = e.target.value.trim();
  render();
});

// ──────────────────────────────────────────
// AUDIO EVENTS
// ──────────────────────────────────────────
audio.addEventListener('timeupdate', ()=>{
  if(!audio.duration) return;
  const p = audio.currentTime / audio.duration;
  // sticky
  document.getElementById('spFill').style.width = (p*100)+'%';
  document.getElementById('spCur').textContent  = fmtT(audio.currentTime);
  // inline
  if(activeKey){
    const [sid,n] = activeKey.split(':');
    const f = document.getElementById(`np-fill-${sid}-${n}`);
    const t = document.getElementById(`np-cur-${sid}-${n}`);
    if(f) f.style.width = (p*100)+'%';
    if(t) t.textContent = fmtT(audio.currentTime);
  }
});
audio.addEventListener('loadedmetadata', ()=>{
  const d = audio.duration;
  if(!d||isNaN(d)) return;
  document.getElementById('spDur').textContent = fmtT(d);
  if(activeKey){
    const [sid,n] = activeKey.split(':');
    const el = document.getElementById(`np-dur-${sid}-${n}`);
    if(el) el.textContent = fmtT(d);
  }
});
audio.addEventListener('play',  ()=>{ playing=true;  syncBtns(); });
audio.addEventListener('pause', ()=>{ playing=false; syncBtns(); });
audio.addEventListener('ended', ()=>{ playing=false; syncBtns(); autoNext(); });
audio.addEventListener('error', ()=>{ handleAudioErr(); });
audio.addEventListener('waiting', ()=>{ setStatus('در حال بارگذاری…'); });
audio.addEventListener('canplay', ()=>{ setStatus(''); });

function setStatus(msg){
  if(!activeKey) return;
  const [sid,n] = activeKey.split(':');
  const el = document.getElementById(`np-status-${sid}-${n}`);
  if(el) el.textContent = msg;
}

function handleAudioErr(){
  if(!activeKey) return;
  const [sid,n] = activeKey.split(':');
  // show Spotify embed
  const fb = document.getElementById(`sp-fb-${sid}-${n}`);
  if(fb){
    const ep = getEp(sid, n);
    if(ep && !fb.querySelector('iframe').src.includes('spotify')){
      fb.querySelector('iframe').src = `https://open.spotify.com/embed/episode/${ep.spotifyId}?utm_source=generator&theme=0`;
    }
    fb.classList.add('show');
  }
  setStatus('پخش مستقیم: استفاده از Spotify');
}

function syncBtns(){
  const icon = playing ? '⏸' : '▶';
  document.getElementById('spPlayBtn').textContent = icon;
  if(activeKey){
    const [sid,n] = activeKey.split(':');
    const b1 = document.getElementById(`npbtn-${sid}-${n}`);
    if(b1) b1.textContent = icon;
    const b2 = document.querySelector(`#card-${sid}-${n} .ep-play`);
    if(b2) b2.textContent = playing ? '⏸' : '▶';
  }
}

function autoNext(){
  if(!activeKey) return;
  const [sid,n] = activeKey.split(':');
  const show = SHOWS[sid];
  if(!show) return;
  const idx = show.episodes.findIndex(e=>String(e.n)===String(n));
  const next = show.episodes[idx+1];
  if(next) activate(sid, next.n);
}

// ──────────────────────────────────────────
// ACTIVATE EPISODE
// ──────────────────────────────────────────
function activate(showId, n){
  const show = SHOWS[showId];
  const ep   = getEp(showId, n);
  if(!show || !ep) return;

  // stop current
  if(playing) audio.pause();
  document.querySelectorAll('.ep').forEach(c=>{
    c.classList.remove('active');
  });

  activeKey = `${showId}:${n}`;
  const card = document.getElementById(`card-${showId}-${n}`);
  if(card){
    card.classList.add('active');
    setTimeout(()=>card.scrollIntoView({behavior:'smooth',block:'nearest'}),80);
  }

  // update sticky
  document.getElementById('spArt').textContent   = show.icon;
  document.getElementById('spArt').style.background = show.dim;
  document.getElementById('spTitle').textContent  = ep.title;
  document.getElementById('spMeta').textContent   = ep.author+' — '+show.title;
  document.getElementById('spFill').style.width   = '0%';
  document.getElementById('spCur').textContent    = '۰:۰۰';
  document.getElementById('spDur').textContent    = '—';
  document.getElementById('stickPlayer').classList.add('show');

  // try audio src from RSS cache
  const cached = sessionStorage.getItem(`${showId}:${n}:url`);
  if(cached){
    loadAndPlay(cached);
  } else {
    // Trigger RSS load then try again
    loadRSS(showId).then(()=>{
      const url = sessionStorage.getItem(`${showId}:${n}:url`);
      if(url){ loadAndPlay(url); }
      else { handleAudioErr(); }
    });
  }
}

function loadAndPlay(src){
  audio.src = src;
  audio.playbackRate = SPEEDS[speedIdx];
  audio.volume = vol;
  audio.muted  = muted;
  audio.load();
  audio.play().catch(()=>handleAudioErr());
}

function toggleEp(showId, n){
  const key = `${showId}:${n}`;
  if(activeKey === key){
    playing ? audio.pause() : audio.play().catch(()=>{});
  } else {
    activate(showId, n);
  }
}

function togglePlay(){
  if(!activeKey) return;
  playing ? audio.pause() : audio.play().catch(()=>{});
}

// ──────────────────────────────────────────
// CONTROLS
// ──────────────────────────────────────────
function skip(s){ audio.currentTime = Math.max(0, Math.min(audio.duration||0, audio.currentTime+s)); }

function seekBar(e, showId, n){
  e.stopPropagation();
  if(!audio.duration) return;
  const bar = document.getElementById(`np-bar-${showId}-${n}`);
  const r   = bar.getBoundingClientRect();
  // RTL: right = 0
  const p   = 1 - (e.clientX - r.left) / r.width;
  audio.currentTime = Math.max(0, Math.min(audio.duration, p * audio.duration));
}

function seekGlobal(e){
  if(!audio.duration) return;
  const bar = document.getElementById('spBar');
  const r   = bar.getBoundingClientRect();
  const p   = (e.clientX - r.left) / r.width;
  audio.currentTime = Math.max(0, Math.min(audio.duration, p * audio.duration));
}

function setVolume(e, sid, n){
  e.stopPropagation();
  const bar = document.getElementById(`vbar-${sid}-${n}`);
  const r   = bar.getBoundingClientRect();
  vol = Math.max(0, Math.min(1, (e.clientX-r.left)/r.width));
  audio.volume = vol;
  muted = vol === 0;
  audio.muted = muted;
  updateVol(sid, n);
}
function toggleMute(sid, n){
  muted = !muted;
  audio.muted = muted;
  updateVol(sid, n);
}
function updateVol(sid, n){
  const f = document.getElementById(`vfill-${sid}-${n}`);
  const i = document.getElementById(`vico-${sid}-${n}`);
  if(f) f.style.width = (muted?0:vol*100)+'%';
  if(i) i.textContent = muted||vol===0 ? '🔇' : vol<0.5 ? '🔉' : '🔊';
}

function cycleSpeed(sid, n){
  speedIdx = (speedIdx+1) % SPEEDS.length;
  audio.playbackRate = SPEEDS[speedIdx];
  const btn = document.getElementById(`spd-${sid}-${n}`);
  if(btn){ btn.textContent=SPEEDS[speedIdx]+'x'; btn.classList.toggle('on', SPEEDS[speedIdx]!==1); }
}

function cycleSleep(sid, n){
  clearTimeout(sleepTimer); sleepTimer=null;
  sleepStep = (sleepStep+1) % SLEEP.length;
  const btn = document.getElementById(`slp-${sid}-${n}`);
  if(SLEEP[sleepStep]===0){
    if(btn) btn.textContent='⏱ تایمر'; btn && btn.classList.remove('on');
    toast('تایمر لغو شد');
  } else {
    const m=SLEEP[sleepStep];
    if(btn){ btn.textContent=`⏱ ${m}د`; btn.classList.add('on'); }
    sleepTimer = setTimeout(()=>{ audio.pause(); toast('تایمر: پخش متوقف شد'); sleepStep=0; if(btn){btn.textContent='⏱ تایمر';btn.classList.remove('on');} }, m*60000);
    toast(`تایمر ${m} دقیقه‌ای فعال شد`);
  }
}

// ──────────────────────────────────────────
// RSS LOADER
// ──────────────────────────────────────────
const rssCache = {};
async function loadRSS(showId){
  if(rssCache[showId]) return;
  const show = SHOWS[showId];
  const PROXIES = [
    u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
    u => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
    u => `https://thingproxy.freeboard.io/fetch/${u}`,
  ];
  let xml = null;
  for(const proxy of PROXIES){
    try{
      const res = await fetch(proxy(show.rss), {signal:AbortSignal.timeout(9000)});
      if(!res.ok) continue;
      const ct = res.headers.get('content-type')||'';
      let raw;
      if(ct.includes('json')){
        const j = await res.json();
        raw = j.contents || j;
      } else {
        raw = await res.text();
      }
      if(typeof raw === 'string' && raw.includes('<enclosure')){
        xml = new DOMParser().parseFromString(raw, 'text/xml');
        break;
      }
    }catch(e){ continue; }
  }
  if(!xml) return;
  const items = [...xml.querySelectorAll('item')].reverse(); // oldest→newest
  items.forEach((item, idx)=>{
    const url = item.querySelector('enclosure')?.getAttribute('url');
    if(!url) return;
    const ep  = show.episodes[show.episodes.length-1-idx] || show.episodes[idx];
    if(ep){ sessionStorage.setItem(`${showId}:${ep.n}:url`, url); ep._url=url; }
  });
  rssCache[showId] = true;
}

// ──────────────────────────────────────────
// RENDER
// ──────────────────────────────────────────
function getFiltered(){
  const list = activeShow==='all' ? Object.values(SHOWS) : [SHOWS[activeShow]].filter(Boolean);
  if(!searchQ) return list;
  return list.map(s=>({
    ...s,
    episodes: s.episodes.filter(e=>
      e.title.includes(searchQ)||e.author.includes(searchQ)||e.tags.some(t=>t.includes(searchQ))||String(e.n).includes(searchQ)
    )
  })).filter(s=>s.episodes.length);
}

function render(){
  const filtered = getFiltered();
  const main = document.getElementById('main');
  if(!filtered.length||filtered.every(s=>!s.episodes.length)){
    main.innerHTML=`<div style="text-align:center;padding:60px 20px;color:var(--ink3)"><div style="font-size:2.8rem;margin-bottom:12px;opacity:.4">🔍</div><p style="font-size:.88rem">اپیزودی پیدا نشد</p></div>`;
    return;
  }
  main.innerHTML = filtered.map((show,si)=>renderShow(show,si)).join('');
  requestAnimationFrame(()=>{
    const obs = new IntersectionObserver(entries=>{
      entries.forEach(e=>{ if(e.isIntersecting){e.target.classList.add('in');obs.unobserve(e.target);} });
    },{threshold:.05,rootMargin:'0px 0px -20px 0px'});
    document.querySelectorAll('.ep,.show-heading').forEach(el=>obs.observe(el));
  });
  document.querySelectorAll('.ep').forEach(card=>{
    card.addEventListener('mousemove',e=>{
      const r=card.getBoundingClientRect();
      card.style.setProperty('--mx',((e.clientX-r.left)/r.width*100)+'%');
      card.style.setProperty('--my',((e.clientY-r.top)/r.height*100)+'%');
    });
  });
  if(activeKey){
    const [sid,n]=activeKey.split(':');
    document.getElementById(`card-${sid}-${n}`)?.classList.add('active');
  }
}

function renderShow(show, si){
  return `
    <div class="show-section">
      <div class="show-heading" style="animation-delay:${si*.08}s">
        <div class="show-icon" style="background:${show.dim};border:1px solid ${show.color}30;color:${show.color}">${show.icon}</div>
        <div class="show-text">
          <div class="name" style="color:${show.color}">${show.title}</div>
          <div class="desc">${show.desc}</div>
          <div class="meta">
            ${show.totalEps?`<span class="show-badge">${show.totalEps} اپیزود</span>`:''}
            <a class="rss-link" href="${show.rss}" target="_blank" rel="noopener">🔔 RSS</a>
          </div>
        </div>
      </div>
      <div class="eps-label">اپیزودها — جدیدترین اول</div>
      ${show.episodes.map((ep,ei)=>renderEp(show,ep,si,ei)).join('')}
    </div>`;
}

function renderEp(show, ep, si, ei){
  const key = `${show.id}:${ep.n}`;
  const act = activeKey===key;
  const isP = act && playing;
  return `
    <div class="ep ${act?'active':''}" id="card-${show.id}-${ep.n}"
         style="animation-delay:${si*.08+ei*.06}s"
         onclick="toggleEp('${show.id}','${ep.n}')">

      <div class="ep-row">
        <div class="ep-num-badge">
          <span>${toFa(ep.n)}</span>
          <span class="ep-n-label">اپیزود</span>
        </div>
        <div class="ep-main">
          <div class="ep-show-tag" style="color:${show.color}">${show.title}</div>
          <div class="ep-title">${ep.title}</div>
          <div class="ep-tags">
            ${ep.tags.map(t=>`<span class="ep-tag">${t}</span>`).join('')}
            <span class="ep-dur-tag">⏱ ${ep.dur}</span>
          </div>
        </div>
        <div class="ep-wave">
          <div class="b"></div><div class="b"></div><div class="b"></div>
          <div class="b"></div><div class="b"></div><div class="b"></div>
        </div>
        <button class="ep-play" onclick="event.stopPropagation();toggleEp('${show.id}','${ep.n}')">${isP?'⏸':'▶'}</button>
      </div>

      <!-- INLINE PLAYER -->
      <div class="ep-panel">
        <div class="ep-panel-inner">
          <div class="native-player">
            <!-- header -->
            <div class="np-header">
              <div class="np-art" style="background:${show.dim};border:1px solid ${show.color}25">${show.icon}</div>
              <div class="np-info">
                <div class="np-t">${ep.title}</div>
                <div class="np-a">${ep.author}</div>
              </div>
              <span class="np-status" id="np-status-${show.id}-${ep.n}"></span>
            </div>
            <!-- progress -->
            <div class="np-prog">
              <span class="np-time" id="np-cur-${show.id}-${ep.n}">۰:۰۰</span>
              <div class="np-bar" id="np-bar-${show.id}-${ep.n}"
                   onclick="seekBar(event,'${show.id}','${ep.n}')">
                <div class="np-bar-fill" id="np-fill-${show.id}-${ep.n}"></div>
              </div>
              <span class="np-time" id="np-dur-${show.id}-${ep.n}">—</span>
            </div>
            <!-- main controls -->
            <div class="np-controls">
              <button class="np-btn skip-label" onclick="event.stopPropagation();skip(-30)">⏮<br>۳۰</button>
              <button class="np-btn skip-label" onclick="event.stopPropagation();skip(-10)">↩<br>۱۰</button>
              <button class="np-btn play-main" id="npbtn-${show.id}-${ep.n}"
                      onclick="event.stopPropagation();toggleEp('${show.id}','${ep.n}')">${isP?'⏸':'▶'}</button>
              <button class="np-btn skip-label" onclick="event.stopPropagation();skip(10)">↪<br>۱۰</button>
              <button class="np-btn skip-label" onclick="event.stopPropagation();skip(30)">⏭<br>۳۰</button>
            </div>
            <!-- bottom controls -->
            <div class="np-bottom">
              <div class="np-vol" onclick="event.stopPropagation()">
                <button class="vol-ico" id="vico-${show.id}-${ep.n}" onclick="toggleMute('${show.id}','${ep.n}')">🔊</button>
                <div class="vol-bar" id="vbar-${show.id}-${ep.n}" onclick="setVolume(event,'${show.id}','${ep.n}')">
                  <div class="vol-fill" id="vfill-${show.id}-${ep.n}"></div>
                </div>
              </div>
              <div class="np-right" onclick="event.stopPropagation()">
                <button class="np-chip" id="spd-${show.id}-${ep.n}"
                        onclick="cycleSpeed('${show.id}','${ep.n}')">۱x</button>
                <button class="np-chip" id="slp-${show.id}-${ep.n}"
                        onclick="cycleSleep('${show.id}','${ep.n}')">⏱ تایمر</button>
              </div>
            </div>
            <!-- Spotify fallback -->
            <div class="spotify-fb" id="sp-fb-${show.id}-${ep.n}">
              <div class="spotify-fb-label">پخش از Spotify:</div>
              <iframe src="" frameborder="0" allowfullscreen
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
                loading="lazy"></iframe>
            </div>
          </div>
        </div>
      </div>

      <!-- ACTIONS -->
      <div class="ep-actions" onclick="event.stopPropagation()">
        <a class="ep-action pri" href="https://open.spotify.com/episode/${ep.spotifyId}" target="_blank" rel="noopener">
          🎵 <span>Spotify</span>
        </a>
        <button class="ep-action" onclick="shareEp('${ep.spotifyId}','${ep.title}')">🔗 <span>اشتراک</span></button>
        <button class="ep-action" onclick="copyLink('${ep.spotifyId}')">📋 <span>کپی لینک</span></button>
      </div>
    </div>`;
}

// ──────────────────────────────────────────
// SHARE / COPY
// ──────────────────────────────────────────
function shareEp(id, title){
  const url=`https://open.spotify.com/episode/${id}`;
  if(navigator.share){ navigator.share({title:'رادیو بکت | '+title,url}).catch(()=>{}); }
  else { doCopy(url); toast('لینک کپی شد ✓'); }
}
function copyLink(id){ doCopy(`https://open.spotify.com/episode/${id}`); toast('لینک کپی شد ✓'); }
function doCopy(t){ navigator.clipboard?.writeText(t).catch(()=>fb(t))||fb(t); }
function fb(t){ const el=document.createElement('textarea'); el.value=t; el.style.cssText='position:fixed;opacity:0'; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el); }

// ──────────────────────────────────────────
// TOAST / SCROLL
// ──────────────────────────────────────────
let tt;
function toast(msg){ const t=document.getElementById('toast'); clearTimeout(tt); t.textContent=msg; t.classList.add('show'); tt=setTimeout(()=>t.classList.remove('show'),2800); }
window.addEventListener('scroll',()=>{ document.getElementById('goTop').classList.toggle('show',scrollY>240); },{passive:true});

// ──────────────────────────────────────────
// KEYBOARD
// ──────────────────────────────────────────
document.addEventListener('keydown', e=>{
  if(e.target.tagName==='INPUT') return;
  if(e.key===' '){ e.preventDefault(); togglePlay(); }
  if(e.key==='ArrowRight') skip(-10);
  if(e.key==='ArrowLeft')  skip(10);
  if(e.key==='ArrowUp')   { audio.volume=Math.min(1,audio.volume+.1); }
  if(e.key==='ArrowDown') { audio.volume=Math.max(0,audio.volume-.1); }
});

// ──────────────────────────────────────────
// UTILS
// ──────────────────────────────────────────
function toFa(n){ return String(n).replace(/\d/g,d=>'۰۱۲۳۴۵۶۷۸۹'[d]); }
function fmtT(s){ if(!s||isNaN(s)) return '۰:۰۰'; const m=Math.floor(s/60),r=Math.floor(s%60); return toFa(m)+':'+toFa(String(r).padStart(2,'0')); }
function getEp(sid,n){ return SHOWS[sid]?.episodes.find(e=>String(e.n)===String(n)); }

// ──────────────────────────────────────────
// BOOT
// ──────────────────────────────────────────
render();
// preload RSS in background
setTimeout(()=>Object.keys(SHOWS).forEach(id=>loadRSS(id)), 2000);
</script>
</body>
</html>
