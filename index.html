<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>رادیو بکت</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@200;300;400;600;700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070a;
  --surface:#0f0f14;
  --card:#141419;
  --card2:#1c1c24;
  --border:#22222e;
  --border2:#2e2e3d;
  --text:#eeeef5;
  --muted:#55556a;
  --muted2:#8888a8;
  --accent:#f5c518;
  --accent2:#ffd84d;
  --accent3:#ff9f43;
  --glow:rgba(245,197,24,0.22);
  --glow2:rgba(245,197,24,0.07);
  --r:16px;
  --r2:10px;
  --ease:cubic-bezier(.4,0,.2,1);
}
body.light{
  --bg:#f2f0ec;
  --surface:#e8e6e1;
  --card:#fff;
  --card2:#f6f4f0;
  --border:#e0ddd8;
  --border2:#ccc8c0;
  --text:#111118;
  --muted:#aaa8a0;
  --muted2:#777770;
  --accent:#c49a00;
  --accent2:#f5c518;
  --accent3:#e08800;
  --glow:rgba(196,154,0,0.18);
  --glow2:rgba(196,154,0,0.06);
}

html{scroll-behavior:smooth}
body{
  font-family:'Vazirmatn',Tahoma,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  transition:background .4s,color .4s;
}

/* ── AURORA ── */
.aurora{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.ao{position:absolute;border-radius:50%;filter:blur(140px);opacity:.09;animation:drift 14s ease-in-out infinite}
.ao:nth-child(1){width:700px;height:450px;top:-120px;right:-180px;background:var(--accent);animation-delay:0s}
.ao:nth-child(2){width:500px;height:600px;bottom:-120px;left:-120px;background:#7b3fe4;animation-delay:-5s}
.ao:nth-child(3){width:350px;height:350px;top:45%;left:38%;background:#1abc9c;animation-delay:-10s}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(35px,-25px) scale(1.08)}66%{transform:translate(-25px,18px) scale(.94)}}
body.light .ao{opacity:.05}

/* ── TOPBAR ── */
.topbar{
  position:sticky;top:0;z-index:200;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;height:58px;
  background:rgba(7,7,10,.82);
  backdrop-filter:blur(28px) saturate(180%);
  -webkit-backdrop-filter:blur(28px) saturate(180%);
  border-bottom:1px solid var(--border);
}
body.light .topbar{background:rgba(242,240,236,.88)}
.topbar-logo{
  display:flex;align-items:center;gap:10px;text-decoration:none;
}
.logo-img{height:36px;width:auto;object-fit:contain}
.logo-fallback{font-size:1.05rem;font-weight:900;color:var(--accent);letter-spacing:-.3px}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:blink 2.2s ease-in-out infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1;box-shadow:0 0 0 0 var(--glow)}50%{opacity:.4;box-shadow:0 0 0 7px transparent}}
.topbar-right{display:flex;gap:6px;align-items:center}
.tb-btn{
  width:38px;height:38px;border-radius:50%;border:1px solid var(--border2);
  background:var(--card2);color:var(--text);
  cursor:pointer;font-size:.88rem;
  display:flex;align-items:center;justify-content:center;
  transition:all .22s;text-decoration:none;
}
.tb-btn:hover{background:var(--border2);transform:scale(1.08);border-color:var(--accent)}

/* ── HERO ── */
.hero{
  position:relative;z-index:1;
  text-align:center;padding:56px 20px 32px;
}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:7px;
  background:var(--glow2);border:1px solid rgba(245,197,24,.28);
  color:var(--accent);font-size:.7rem;font-weight:700;
  padding:5px 16px;border-radius:100px;letter-spacing:.1em;
  margin-bottom:22px;animation:fadeUp .55s var(--ease) both;
}
.live-dot{width:6px;height:6px;border-radius:50%;background:#ff4040;animation:blink 1.4s infinite}
.hero h1{
  font-size:clamp(2rem,8vw,3.6rem);
  font-weight:900;line-height:1.1;letter-spacing:-.025em;
  margin-bottom:12px;animation:fadeUp .6s .08s var(--ease) both;
}
.hero h1 em{
  font-style:normal;color:transparent;
  background:linear-gradient(130deg,var(--accent),var(--accent2),var(--accent3));
  -webkit-background-clip:text;background-clip:text;
  background-size:220% auto;animation:shimmer 3.5s linear infinite;
}
@keyframes shimmer{0%{background-position:0%}100%{background-position:220%}}
.hero-sub{font-size:.92rem;color:var(--muted2);font-weight:300;margin-bottom:30px;animation:fadeUp .6s .15s var(--ease) both}

/* ── SEARCH ── */
.search-wrap{
  position:relative;max-width:520px;margin:0 auto 28px;
  animation:fadeUp .6s .2s var(--ease) both;
}
.search-ico{position:absolute;top:50%;right:18px;transform:translateY(-50%);color:var(--muted);pointer-events:none;font-size:.9rem}
#searchInput{
  width:100%;padding:13px 48px 13px 20px;
  border:1.5px solid var(--border2);border-radius:100px;
  background:var(--card);color:var(--text);
  font-family:inherit;font-size:.9rem;outline:none;
  transition:all .3s;box-shadow:0 4px 24px rgba(0,0,0,.18);
}
#searchInput:focus{border-color:var(--accent);box-shadow:0 0 0 4px var(--glow),0 4px 24px rgba(0,0,0,.22)}
#searchInput::placeholder{color:var(--muted)}

/* ── TABS ── */
.tabs{
  display:flex;gap:0;max-width:680px;margin:0 auto 36px;
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);padding:4px;overflow-x:auto;
  animation:fadeUp .6s .25s var(--ease) both;
  -ms-overflow-style:none;scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex:1;min-width:82px;padding:9px 12px;border:none;border-radius:var(--r2);
  background:transparent;color:var(--muted2);
  font-family:inherit;font-size:.76rem;font-weight:600;
  cursor:pointer;transition:all .28s;white-space:nowrap;
  display:flex;align-items:center;justify-content:center;gap:5px;
}
.tab:hover{color:var(--text);background:var(--card2)}
.tab.active{background:var(--accent);color:#000;box-shadow:0 4px 18px var(--glow)}
.tab-badge{background:rgba(0,0,0,.18);font-size:.6rem;padding:1px 5px;border-radius:100px}
.tab.active .tab-badge{background:rgba(0,0,0,.22)}

/* ── MAIN ── */
main{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:0 14px 120px}

/* ── SHOW HEADER ── */
.show-header{
  display:flex;align-items:center;gap:14px;
  padding:18px 20px;background:var(--card);
  border:1px solid var(--border);border-radius:var(--r);
  margin-bottom:16px;
  opacity:0;transform:translateY(14px);
  transition:all .45s var(--ease);
}
.show-header.visible{opacity:1;transform:none}
.show-cover{
  width:68px;height:68px;border-radius:var(--r2);
  display:flex;align-items:center;justify-content:center;
  font-size:1.9rem;flex-shrink:0;position:relative;overflow:hidden;
}
.show-cover::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.13),transparent)}
.show-info{flex:1;min-width:0}
.show-name{font-size:1.1rem;font-weight:900;margin-bottom:3px}
.show-desc{font-size:.76rem;color:var(--muted2);line-height:1.5}
.show-stats{display:flex;gap:10px;margin-top:7px;align-items:center}
.show-stat{font-size:.68rem;color:var(--muted);display:flex;align-items:center;gap:3px}
.show-stat strong{color:var(--accent)}
.rss-btn{
  font-size:.65rem;color:inherit;text-decoration:none;
  border:1px solid var(--border2);border-radius:6px;padding:2px 8px;
  transition:all .2s;
}
.rss-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ── EPISODE CARD ── */
.ep-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);margin-bottom:10px;overflow:hidden;
  cursor:pointer;position:relative;
  opacity:0;transform:translateY(24px);
  transition:transform .3s var(--ease),box-shadow .3s var(--ease),border-color .3s var(--ease);
}
.ep-card.visible{animation:cardIn .5s var(--ease) forwards}
@keyframes cardIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.ep-card:hover{border-color:var(--border2);box-shadow:0 10px 40px rgba(0,0,0,.32);transform:translateY(-1px)}
.ep-card.active{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 14px 50px rgba(0,0,0,.38)}

.ep-card::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at var(--mx,50%) var(--my,50%),var(--glow) 0%,transparent 65%);
  opacity:0;transition:opacity .4s;pointer-events:none;z-index:0;
}
.ep-card:hover::before{opacity:1}

.ep-body{display:flex;align-items:center;gap:14px;padding:14px 16px;position:relative;z-index:1}

/* Play button */
.ep-play-wrap{flex-shrink:0;width:48px;height:48px;position:relative}
.ep-play-wrap svg{position:absolute;inset:0;transform:rotate(-90deg)}
.ep-play-wrap circle{fill:none;stroke:var(--border2);stroke-width:1.5}
.prog-ring{stroke:var(--accent);stroke-width:2;stroke-dasharray:138;stroke-dashoffset:138;transition:stroke-dashoffset .2s linear}
.ep-play-btn{
  position:absolute;inset:5px;border-radius:50%;border:none;
  background:var(--card2);color:var(--text);
  font-size:1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .22s;
}
.ep-card.active .ep-play-btn{background:var(--accent);color:#000;box-shadow:0 4px 18px var(--glow)}
.ep-play-btn:hover{transform:scale(1.08)}

.ep-info{flex:1;min-width:0}
.ep-num{font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px}
.ep-title{font-size:.88rem;font-weight:700;line-height:1.45;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.ep-meta{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.ep-tag{font-size:.6rem;padding:2px 7px;border-radius:100px;background:var(--card2);color:var(--muted2);border:1px solid var(--border)}
.ep-dur{font-size:.68rem;color:var(--muted);margin-right:auto}

/* Waveform */
.ep-wave{display:flex;align-items:center;gap:2px;height:26px;flex-shrink:0}
.wb{width:3px;border-radius:2px;background:var(--border2);transition:background .3s}
.ep-card.active .wb{background:var(--accent);animation:wv .75s ease-in-out infinite}
.wb:nth-child(1){height:5px;animation-delay:.00s}
.wb:nth-child(2){height:13px;animation-delay:.07s}
.wb:nth-child(3){height:20px;animation-delay:.14s}
.wb:nth-child(4){height:9px;animation-delay:.04s}
.wb:nth-child(5){height:17px;animation-delay:.11s}
.wb:nth-child(6){height:7px;animation-delay:.18s}
.wb:nth-child(7){height:15px;animation-delay:.06s}
@keyframes wv{0%,100%{transform:scaleY(.3)}50%{transform:scaleY(1)}}

/* ── PLAYER PANEL ── */
.ep-player{
  overflow:hidden;max-height:0;
  transition:max-height .5s cubic-bezier(.4,0,.2,1);
  background:var(--surface);border-top:1px solid var(--border);
}
.ep-card.active .ep-player{max-height:320px}
.player-inner{padding:14px 16px 16px;position:relative;z-index:1}

/* Player layout */
.pl-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.pl-art{
  width:46px;height:46px;border-radius:9px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;position:relative;overflow:hidden;
}
.pl-art::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.18),transparent)}
.pl-info{flex:1;min-width:0}
.pl-title{font-size:.82rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.pl-author{font-size:.68rem;color:var(--muted2)}

/* Progress bar */
.pl-prog-wrap{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.pl-time{font-size:.64rem;color:var(--muted);direction:ltr;white-space:nowrap;font-variant-numeric:tabular-nums;min-width:34px}
.pl-track{
  flex:1;height:4px;background:var(--border2);border-radius:100px;
  cursor:pointer;position:relative;transition:height .18s;
}
.pl-track:hover{height:7px}
.pl-fill{
  height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));
  border-radius:100px;width:0%;transition:width .15s linear;position:relative;pointer-events:none;
}
.pl-thumb{
  position:absolute;right:-6px;top:50%;transform:translateY(-50%);
  width:13px;height:13px;border-radius:50%;background:var(--accent);
  box-shadow:0 0 10px var(--glow);opacity:0;transition:opacity .18s;pointer-events:none;
}
.pl-track:hover .pl-thumb{opacity:1}

/* Controls row */
.pl-controls{display:flex;align-items:center;justify-content:center;gap:10px}
.pl-btn{
  border:none;background:none;color:var(--muted2);
  cursor:pointer;padding:7px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  transition:all .18s;font-size:.95rem;
}
.pl-btn:hover{color:var(--text);background:var(--card2)}
.pl-btn svg{width:18px;height:18px;fill:currentColor}
.pl-btn.main{
  width:46px;height:46px;background:var(--accent);color:#000;
  box-shadow:0 4px 18px var(--glow);font-size:1.2rem;
}
.pl-btn.main:hover{transform:scale(1.08);box-shadow:0 6px 26px var(--glow)}

/* Volume */
.pl-vol-wrap{display:flex;align-items:center;gap:6px}
.pl-vol-icon{font-size:.9rem;cursor:pointer;color:var(--muted2);transition:color .2s;border:none;background:none;padding:0}
.pl-vol-icon:hover{color:var(--text)}
.pl-vol-track{
  width:62px;height:3px;background:var(--border2);border-radius:100px;
  cursor:pointer;position:relative;
}
.pl-vol-fill{height:100%;background:var(--accent2);border-radius:100px;width:100%;pointer-events:none}

/* Speed */
.pl-speed{
  font-size:.66rem;font-weight:700;
  background:var(--card2);border:1px solid var(--border2);
  border-radius:6px;padding:3px 8px;color:var(--muted2);
  cursor:pointer;transition:all .18s;white-space:nowrap;
  font-family:inherit;
}
.pl-speed:hover,.pl-speed.on{border-color:var(--accent);color:var(--accent)}

/* Bottom row */
.pl-bottom{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:10px}

/* Actions */
.ep-actions{
  display:none;gap:7px;padding:0 16px 14px;position:relative;z-index:1;
}
.ep-card.active .ep-actions{display:flex}
.ep-act{
  flex:1;padding:8px 5px;border:1px solid var(--border);border-radius:var(--r2);
  background:transparent;color:var(--muted2);font-family:inherit;font-size:.7rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;
  transition:all .22s;text-decoration:none;font-weight:600;
}
.ep-act:hover{border-color:var(--accent);color:var(--accent);background:var(--glow2)}
.ep-act.primary{border-color:rgba(245,197,24,.4);color:var(--accent);background:var(--glow2)}

/* ── SECTION LABEL ── */
.section-lbl{
  font-size:.64rem;font-weight:700;letter-spacing:.14em;
  color:var(--muted);text-transform:uppercase;
  margin-bottom:12px;padding-right:2px;
  display:flex;align-items:center;gap:10px;
}
.section-lbl::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── EMPTY ── */
.empty{text-align:center;padding:56px 20px;color:var(--muted)}
.empty .ei{font-size:3rem;margin-bottom:14px;opacity:.45}
.empty p{font-size:.88rem;line-height:1.7}

/* ── GLOBAL STICKY PLAYER ── */
.global-player{
  position:fixed;bottom:0;left:0;right:0;z-index:300;
  background:rgba(10,10,14,.94);
  backdrop-filter:blur(30px) saturate(200%);
  -webkit-backdrop-filter:blur(30px) saturate(200%);
  border-top:1px solid var(--border);
  transform:translateY(100%);
  transition:transform .4s var(--ease);
  padding:10px 16px 14px;
}
body.light .global-player{background:rgba(242,240,236,.95)}
.global-player.show{transform:translateY(0)}
.gp-inner{max-width:720px;margin:0 auto;display:flex;flex-direction:column;gap:8px}
.gp-top{display:flex;align-items:center;gap:10px}
.gp-art{
  width:40px;height:40px;border-radius:8px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:1.3rem;overflow:hidden;position:relative;
}
.gp-art::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.15),transparent)}
.gp-info{flex:1;min-width:0}
.gp-title{font-size:.78rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px}
.gp-meta{font-size:.64rem;color:var(--muted2)}
.gp-controls{display:flex;align-items:center;gap:6px}
.gp-btn{
  border:none;background:none;color:var(--muted2);cursor:pointer;
  padding:6px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:.88rem;transition:all .18s;
}
.gp-btn:hover{color:var(--text);background:var(--card2)}
.gp-btn.main{
  width:38px;height:38px;background:var(--accent);color:#000;
  box-shadow:0 3px 14px var(--glow);border-radius:50%;font-size:1rem;
}
.gp-btn.main:hover{transform:scale(1.07)}
.gp-prog-wrap{display:flex;align-items:center;gap:8px}
.gp-time{font-size:.6rem;color:var(--muted);direction:ltr;white-space:nowrap;font-variant-numeric:tabular-nums;min-width:30px}
.gp-track{flex:1;height:3px;background:var(--border2);border-radius:100px;cursor:pointer;position:relative}
.gp-track:hover{height:5px;transition:height .15s}
.gp-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:100px;width:0%;pointer-events:none;transition:width .15s linear}

/* ── SCROLL TOP ── */
#goTop{
  position:fixed;bottom:72px;left:16px;
  width:42px;height:42px;border-radius:50%;border:1px solid var(--border2);
  background:var(--card);color:var(--text);font-size:1rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(0,0,0,.28);z-index:300;
  opacity:0;transform:translateY(10px) scale(.9);
  transition:all .3s var(--ease);pointer-events:none;
}
#goTop.show{opacity:1;transform:none;pointer-events:auto}
#goTop:hover{background:var(--accent);color:#000;border-color:var(--accent)}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:78px;left:50%;transform:translateX(-50%) translateY(12px);
  background:var(--card2);border:1px solid var(--border2);color:var(--text);
  padding:9px 20px;border-radius:100px;font-size:.78rem;
  opacity:0;transition:all .28s var(--ease);z-index:400;pointer-events:none;
  white-space:nowrap;box-shadow:0 8px 30px rgba(0,0,0,.3);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── FADE UP ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

/* ── MOBILE ── */
@media(max-width:480px){
  .hero h1{font-size:1.9rem}
  .tab{min-width:74px;font-size:.7rem;padding:8px 9px}
  .ep-act span{display:none}
  .pl-vol-wrap{display:none}
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--accent)}

/* ── REDUCED MOTION ── */
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body class="dark">

<div class="aurora" aria-hidden="true">
  <div class="ao"></div><div class="ao"></div><div class="ao"></div>
</div>

<!-- TOPBAR -->
<header class="topbar">
  <a class="topbar-logo" href="#" onclick="return false">
    <div class="logo-dot"></div>
    <img class="logo-img" id="logoImg" src="" alt="رادیو بکت" style="display:none" onerror="this.style.display='none';document.getElementById('logoFb').style.display='block'"/>
    <span class="logo-fallback" id="logoFb">رادیو بکت</span>

// ═══ STATE ═══
let activeShow = 'all';

const audio = document.getElementById('mainAudio');

// ═══ THEME ═══
function toggleTheme(){

  const tab = e.target.closest('.tab');

// ═══ AUDIO EVENTS ═══
audio.addEventListener('timeupdate', onTimeUpdate);
audio.addEventListener('ended', onEnded);
audio.addEventListener('play', () => { isPlaying = true; syncPlayBtns(); });
audio.addEventListener('pause', () => { isPlaying = false; syncPlayBtns(); });
audio.addEventListener('error', onAudioError);
audio.addEventListener('loadedmetadata', () => {
  updateDuration();
});

function onTimeUpdate(){
  if(!audio.duration) return;
  const pct = audio.currentTime / audio.duration;
  // Update global player
  document.getElementById('gpFill').style.width = (pct*100)+'%';
  document.getElementById('gpCurTime').textContent = fmtTime(audio.currentTime);
  // Update inline player if open
  if(activeKey){
    const [sid,n] = activeKey.split(':');
    const fillEl = document.getElementById(`fill-${sid}-${n}`);
    const curEl = document.getElementById(`cur-${sid}-${n}`);
    const ring = document.getElementById(`ring-${sid}-${n}`);
    if(fillEl) fillEl.style.width = (pct*100)+'%';
    if(curEl) curEl.textContent = fmtTime(audio.currentTime);
    if(ring){ const c = 138; ring.style.strokeDashoffset = c - pct*c; }
  }
}

function onEnded(){
  isPlaying = false;
  syncPlayBtns();
  // Auto-play next episode
  autoNext();
}

function onAudioError(){
  // If direct audio fails, show Spotify fallback
  toast('پخش مستقیم موجود نیست — Spotify باز می‌شود');
  if(currentShowId && currentEpN){
    const ep = getEp(currentShowId, currentEpN);
    if(ep && ep.spotifyId){
      window.open(`https://open.spotify.com/episode/${ep.spotifyId}`, '_blank');
    }
  }
}

function updateDuration(){
  const d = audio.duration;
  if(!d || isNaN(d)) return;
  document.getElementById('gpDurTime').textContent = fmtTime(d);
  if(activeKey){
    const [sid,n] = activeKey.split(':');
    const durEl = document.getElementById(`dur-${sid}-${n}`);
    if(durEl) durEl.textContent = fmtTime(d);
  }
}

function autoNext(){
  if(!currentShowId || !currentEpN) return;
  const show = SHOWS[currentShowId];
  if(!show) return;
  const idx = show.episodes.findIndex(e => e.n == currentEpN);
  if(idx > 0){
    const next = show.episodes[idx-1]; // descending order, so next newer = idx-1... actually auto-play older
    const prev = show.episodes[idx+1];
    if(prev){
      playEp(currentShowId, prev.n);
    }
  }
}

// ═══ PLAY CONTROL ═══
function playEp(showId, n){
  const show = SHOWS[showId];
  const ep = show.episodes.find(e => e.n == n);
  if(!show || !ep) return;

  currentShowId = showId;
  currentEpN = n;
  const key = `${showId}:${n}`;

  // Deactivate previous
  document.querySelectorAll('.ep-card').forEach(c => c.classList.remove('active'));
  activeKey = key;

  const card = document.getElementById(`card-${showId}-${n}`);
  if(card){
    card.classList.add('active');
    setTimeout(() => card.scrollIntoView({behavior:'smooth',block:'nearest'}), 80);
  }

  // Update global player UI
  document.getElementById('gpArt').textContent = show.icon;
  document.getElementById('gpArt').style.background = show.colorDim;
  document.getElementById('gpTitle').textContent = ep.title;
  document.getElementById('gpMeta').textContent = `${ep.author} — ${show.title}`;
  document.getElementById('gpFill').style.width = '0%';
  document.getElementById('gpCurTime').textContent = '۰:۰۰';
  document.getElementById('gpDurTime').textContent = '—';
  document.getElementById('globalPlayer').classList.add('show');

  // Determine audio source
  let src = ep.audioSrc;
  if(!src){
    // Try RSS-loaded sources first, then Spotify embed fallback
    const rssKey = `${showId}:${n}:audio`;
    src = sessionStorage.getItem(rssKey) || null;
  }

  if(src){
    audio.src = src;
    audio.load();
    audio.play().catch(()=>{});
  } else {
    // No direct audio - show Spotify embed in the card
    showSpotifyFallback(showId, n, ep.spotifyId);
    toast('در حال بارگذاری از RSS...');
    // Try loading RSS
    loadRSSForShow(showId).then(() => {
      const rssKey = `${showId}:${n}:audio`;
      const rssSrc = sessionStorage.getItem(rssKey);
      if(rssSrc){
        ep.audioSrc = rssSrc;
        audio.src = rssSrc;
        audio.load();
        audio.play().catch(()=>{});
        hideSpotifyFallback(showId, n);
      }
    });
  }
}

function showSpotifyFallback(showId, n, spotifyId){
  const fbEl = document.getElementById(`spotify-fb-${showId}-${n}`);
  if(fbEl){
    fbEl.style.display = 'block';
    fbEl.src = `https://open.spotify.com/embed/episode/${spotifyId}?utm_source=generator&theme=0`;
  }
}

function hideSpotifyFallback(showId, n){
  const fbEl = document.getElementById(`spotify-fb-${showId}-${n}`);
  if(fbEl) fbEl.style.display = 'none';
}

function toggleCard(showId, n){
  const key = `${showId}:${n}`;
  if(activeKey === key){
    // Toggle play/pause
    if(isPlaying){ audio.pause(); }
    else { audio.play().catch(()=>{}); }
  } else {
    if(isPlaying || activeKey){ audio.pause(); }
    playEp(showId, n);
  }
}

function toggleGlobalPlay(){
  if(!currentShowId) return;
  if(isPlaying){ audio.pause(); }
  else { audio.play().catch(()=>{}); }
}

function syncPlayBtns(){
  // Global player
  document.getElementById('gpPlayBtn').textContent = isPlaying ? '⏸' : '▶';
  // Inline
  if(activeKey){
    const [sid,n] = activeKey.split(':');
    const btn = document.getElementById(`pbtn-${sid}-${n}`);
    if(btn) btn.textContent = isPlaying ? '⏸' : '▶';
  }
}

function skipTime(sec){
  audio.currentTime = Math.max(0, Math.min(audio.duration||0, audio.currentTime + sec));
}

// ═══ SEEK ═══
function seekTrack(e, showId, n){
  e.stopPropagation();
  const track = document.getElementById(`track-${showId}-${n}`);
  if(!track || !audio.duration) return;
  const rect = track.getBoundingClientRect();
  // RTL: right side = start
  const pct = 1 - (e.clientX - rect.left) / rect.width;
  audio.currentTime = pct * audio.duration;
}

function seekGlobal(e){
  const track = document.getElementById('gpTrack');
  if(!track || !audio.duration) return;
  const rect = track.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  audio.currentTime = pct * audio.duration;
}

// ═══ VOLUME ═══
function setVol(e, showId, n){
  e.stopPropagation();
  const track = document.getElementById(`vtrak-${showId}-${n}`);
  if(!track) return;
  const rect = track.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  vol = Math.max(0, Math.min(1, pct));
  audio.volume = vol;
  isMuted = vol === 0;
  updateVolUI(showId, n);
}

function toggleMute(showId, n){
  isMuted = !isMuted;
  audio.muted = isMuted;
  updateVolUI(showId, n);
}

function updateVolUI(showId, n){
  const fill = document.getElementById(`vfill-${showId}-${n}`);
  const icon = document.getElementById(`vico-${showId}-${n}`);
  if(fill) fill.style.width = (isMuted ? 0 : vol*100)+'%';
  if(icon) icon.textContent = isMuted || vol===0 ? '🔇' : vol<0.5 ? '🔉' : '🔊';
}

// ═══ SPEED ═══
function cycleSpeed(showId, n){
  speedIdx = (speedIdx + 1) % speeds.length;
  currentSpeed = speeds[speedIdx];
  audio.playbackRate = currentSpeed;
  const btn = document.getElementById(`spd-${showId}-${n}`);
  if(btn) btn.textContent = currentSpeed + 'x';
}

// ═══ SLEEP TIMER ═══
let sleepTimer = null;
function setSleep(showId, n){
  const options = ['۱۵ دقیقه','۳۰ دقیقه','۴۵ دقیقه','۱ ساعت','لغو'];
  const mins = [15,30,45,60,0];
  // Simple cycle
  const btn = document.getElementById(`sleep-${showId}-${n}`);
  if(!btn) return;
  const cur = btn.dataset.step ? parseInt(btn.dataset.step) : 0;
  const next = (cur + 1) % options.length;
  btn.dataset.step = next;
  btn.textContent = '⏱ '+options[next];
  if(sleepTimer){ clearTimeout(sleepTimer); sleepTimer = null; }
  if(mins[next] > 0){
    sleepTimer = setTimeout(()=>{ audio.pause(); toast('تایمر خواب: پخش متوقف شد'); }, mins[next]*60*1000);
    toast(`تایمر: ${options[next]}`);
  } else {
    toast('تایمر لغو شد');
    btn.textContent = '⏱ تایمر';
    btn.dataset.step = '';
  }
}

// ═══ RENDER ═══
function getFiltered(){
  const shows = activeShow === 'all' ? Object.values(SHOWS) : [SHOWS[activeShow]].filter(Boolean);
  if(!searchQ) return shows;
  return shows.map(show => ({
    ...show,
    episodes: show.episodes.filter(ep =>
      ep.title.includes(searchQ) || ep.author.includes(searchQ) || ep.tags.some(t=>t.includes(searchQ)) || String(ep.n).includes(searchQ)
    )
  })).filter(s => s.episodes.length > 0);
}

function render(){
  const filtered = getFiltered();
  const main = document.getElementById('mainContent');
  if(!filtered.length || filtered.every(s=>s.episodes.length===0)){
    main.innerHTML = `<div class="empty"><div class="ei">🔍</div><p>اپیزودی پیدا نشد<br><small>با کلمه دیگری جستجو کنید</small></p></div>`;
    return;
  }
  main.innerHTML = filtered.map((show,si)=>`
    <div class="show-block" id="show-${show.id}">
      ${renderShowHeader(show,si)}
      <div class="section-lbl">اپیزودها — جدیدترین اول</div>
      ${show.episodes.map((ep,ei)=>renderCard(show,ep,si,ei)).join('')}
    </div>
  `).join('');

  // Intersection observer
  requestAnimationFrame(()=>{
    const obs = new IntersectionObserver(entries=>{
      entries.forEach(e=>{
        if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target)}
      });
    },{threshold:.05,rootMargin:'0px 0px -24px 0px'});
    document.querySelectorAll('.ep-card,.show-header').forEach(el=>obs.observe(el));
  });

  // Liquid hover
  document.querySelectorAll('.ep-card').forEach(card=>{
    card.addEventListener('mousemove',e=>{
      const r=card.getBoundingClientRect();
      card.style.setProperty('--mx',((e.clientX-r.left)/r.width*100)+'%');
      card.style.setProperty('--my',((e.clientY-r.top)/r.height*100)+'%');
    });
  });

  // Restore active state
  if(activeKey){
    const [sid,n] = activeKey.split(':');
    const card = document.getElementById(`card-${sid}-${n}`);
    if(card) card.classList.add('active');
  }
}

function renderShowHeader(show,si){
  return `
    <div class="show-header" style="animation-delay:${si*.1}s">
      <div class="show-cover" style="background:${show.colorDim};border:1px solid ${show.color}28">${show.icon}</div>
      <div class="show-info">
        <div class="show-name" style="color:${show.color}">${show.title}</div>
        <div class="show-desc">${show.desc}</div>
        <div class="show-stats">
          ${show.totalEps ? `<div class="show-stat"><strong>${show.totalEps}</strong> اپیزود</div><div class="show-stat">•</div>` : ''}
          <a class="rss-btn" href="${show.rss}" target="_blank" rel="noopener">🔔 RSS</a>
        </div>
      </div>
    </div>
  `;
}

function renderCard(show,ep,si,ei){
  const key = `${show.id}:${ep.n}`;
  const isActive = activeKey === key;
  const isPlaying_ = isActive && isPlaying;
  return `
    <div class="ep-card ${isActive?'active':''}"
         id="card-${show.id}-${ep.n}"
         style="animation-delay:${si*.1+ei*.07}s"
         onclick="toggleCard('${show.id}','${ep.n}')">

      <div class="ep-body">
        <div class="ep-play-wrap">
          <svg width="48" height="48" viewBox="0 0 48 48">
            <circle cx="24" cy="24" r="22"/>
            <circle class="prog-ring" id="ring-${show.id}-${ep.n}" cx="24" cy="24" r="22"/>
          </svg>
          <button class="ep-play-btn" id="pbtn-${show.id}-${ep.n}"
                  onclick="event.stopPropagation();toggleCard('${show.id}','${ep.n}')">
            ${isPlaying_ ? '⏸' : '▶'}
          </button>
        </div>
        <div class="ep-info">
          <div class="ep-num" style="color:${show.color}">${show.title} — اپیزود ${toFa(ep.n)}</div>
          <div class="ep-title">${ep.title}</div>
          <div class="ep-meta">
            ${ep.tags.map(t=>`<span class="ep-tag">${t}</span>`).join('')}
            <span class="ep-dur">${ep.dur}</span>
          </div>
        </div>
        <div class="ep-wave">${'<div class="wb"></div>'.repeat(7)}</div>
      </div>

      <!-- INLINE PLAYER -->
      <div class="ep-player">
        <div class="player-inner">
          <!-- Top row -->
          <div class="pl-top">
            <div class="pl-art" style="background:${show.colorDim};border:1px solid ${show.color}30">${show.icon}</div>
            <div class="pl-info">
              <div class="pl-title">${ep.title}</div>
              <div class="pl-author">${ep.author}</div>
            </div>
          </div>

          <!-- Progress -->
          <div class="pl-prog-wrap">
            <span class="pl-time" id="cur-${show.id}-${ep.n}">۰:۰۰</span>
            <div class="pl-track" id="track-${show.id}-${ep.n}"
                 onclick="seekTrack(event,'${show.id}','${ep.n}')">
              <div class="pl-fill" id="fill-${show.id}-${ep.n}">
                <div class="pl-thumb"></div>
              </div>
            </div>
            <span class="pl-time" id="dur-${show.id}-${ep.n}">--:--</span>
          </div>

          <!-- Controls -->
          <div class="pl-controls">
            <button class="pl-btn" onclick="event.stopPropagation();skipTime(-15)" title="۱۵ ثانیه قبل">⏮ ۱۵</button>
            <button class="pl-btn" onclick="event.stopPropagation();skipTime(-5)" title="۵ ثانیه قبل">↩ ۵</button>
            <button class="pl-btn main" id="pbtn2-${show.id}-${ep.n}"
                    onclick="event.stopPropagation();toggleCard('${show.id}','${ep.n}')">
              ${isPlaying_ ? '⏸' : '▶'}
            </button>
            <button class="pl-btn" onclick="event.stopPropagation();skipTime(5)" title="۵ ثانیه بعد">↪ ۵</button>
            <button class="pl-btn" onclick="event.stopPropagation();skipTime(15)" title="۱۵ ثانیه بعد">⏭ ۱۵</button>
          </div>

          <!-- Bottom: volume + speed + sleep -->
          <div class="pl-bottom">
            <div class="pl-vol-wrap" onclick="event.stopPropagation()">
              <button class="pl-vol-icon" id="vico-${show.id}-${ep.n}" onclick="toggleMute('${show.id}','${ep.n}')">🔊</button>
              <div class="pl-vol-track" id="vtrak-${show.id}-${ep.n}"
                   onclick="setVol(event,'${show.id}','${ep.n}')">
                <div class="pl-vol-fill" id="vfill-${show.id}-${ep.n}"></div>
              </div>
            </div>
            <button class="pl-speed" id="spd-${show.id}-${ep.n}"
                    onclick="event.stopPropagation();cycleSpeed('${show.id}','${ep.n}')">
              ${currentSpeed}x
            </button>
            <button class="pl-speed" id="sleep-${show.id}-${ep.n}"
                    onclick="event.stopPropagation();setSleep('${show.id}','${ep.n}')">
              ⏱ تایمر
            </button>
          </div>

          <!-- Spotify fallback iframe (hidden by default) -->
          <iframe id="spotify-fb-${show.id}-${ep.n}"
            style="display:none;width:100%;height:80px;border:none;border-radius:10px;margin-top:8px"
            frameborder="0" allowfullscreen
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
            loading="lazy">
          </iframe>
        </div>
      </div>

      <!-- ACTIONS -->
      <div class="ep-actions" onclick="event.stopPropagation()">
        <a class="ep-act primary" href="https://open.spotify.com/episode/${ep.spotifyId}" target="_blank" rel="noopener">
          🎵 <span>Spotify</span>
        </a>
        <button class="ep-act" onclick="shareEp('${ep.spotifyId}','${ep.title}')">🔗 <span>اشتراک</span></button>
        <button class="ep-act" onclick="copyLnk('${ep.spotifyId}')">📋 <span>کپی</span></button>
      </div>
    </div>
  `;
}

// ═══ RSS LOADER ═══
const rssLoaded = {};
async function loadRSSForShow(showId){
  if(rssLoaded[showId]) return;
  const show = SHOWS[showId];
  if(!show) return;
  try{
    // Use a CORS proxy for RSS
    const proxies = [
      `https://corsproxy.io/?${encodeURIComponent(show.rss)}`,
      `https://api.allorigins.win/get?url=${encodeURIComponent(show.rss)}`
    ];
    let text = null;
    for(const proxy of proxies){
      try{
        const res = await fetch(proxy, {signal: AbortSignal.timeout(8000)});
        if(!res.ok) continue;
        const data = await res.json().catch(async()=>({contents: await res.text()}));
        text = data.contents || data;
        if(typeof text === 'string' && text.includes('<enclosure')) break;
      }catch(e){ continue; }
    }
    if(!text) return;
    const xml = new DOMParser().parseFromString(text,'text/xml');
    const items = [...xml.querySelectorAll('item')];
    // Map items to episodes (reverse order = oldest first in RSS typically)
    items.forEach((item, idx)=>{
      const enclosure = item.querySelector('enclosure');
      const audioUrl = enclosure?.getAttribute('url');
      if(!audioUrl) return;
      // Try to match by position
      const ep = show.episodes[idx] || show.episodes[show.episodes.length - 1 - idx];
      if(ep){
        ep.audioSrc = audioUrl;
        sessionStorage.setItem(`${showId}:${ep.n}:audio`, audioUrl);
      }
    });
    rssLoaded[showId] = true;
    // Update durations
    if(show.totalEps === null && items.length > 0){
      show.totalEps = items.length;
    }
  }catch(e){ /* silent */ }
}

// ═══ SHARE / COPY ═══
function shareEp(id, title){
  const url = `https://open.spotify.com/episode/${id}`;
  if(navigator.share){
    navigator.share({title:'رادیو بکت | '+title, url}).catch(()=>{});
  } else {
    doCopy(url); toast('لینک کپی شد ✓');
  }
}
function copyLnk(id){
  doCopy(`https://open.spotify.com/episode/${id}`);
  toast('لینک کپی شد ✓');
}
function doCopy(t){
  navigator.clipboard?.writeText(t).catch(()=>fbCopy(t))||fbCopy(t);
}
function fbCopy(t){
  const el=document.createElement('textarea');
  el.value=t;el.style.cssText='position:fixed;opacity:0';
  document.body.appendChild(el);el.select();
  document.execCommand('copy');document.body.removeChild(el);
}

// ═══ TOAST ═══
let toastT;
function toast(msg){
  const t=document.getElementById('toast');
  clearTimeout(toastT);
  t.textContent=msg;t.classList.add('show');
  toastT=setTimeout(()=>t.classList.remove('show'),2800);
}

// ═══ UTILS ═══
function toFa(n){return String(n).replace(/\d/g,d=>'۰۱۲۳۴۵۶۷۸۹'[d])}
function fmtTime(s){
  if(!s||isNaN(s)) return '۰:۰۰';
  const m=Math.floor(s/60);const sec=Math.floor(s%60);
  return toFa(m)+':'+toFa(String(sec).padStart(2,'0'));
}
function getEp(showId, n){
  return SHOWS[showId]?.episodes.find(e=>e.n==n);
}

// ═══ SCROLL TOP ═══
const goTopBtn=document.getElementById('goTop');
window.addEventListener('scroll',()=>{
  goTopBtn.classList.toggle('show',window.scrollY>260);
},{passive:true});

// ═══ KEYBOARD SHORTCUTS ═══
document.addEventListener('keydown', e => {
  if(e.target.tagName === 'INPUT') return;
  if(e.key === ' '){ e.preventDefault(); toggleGlobalPlay(); }
  if(e.key === 'ArrowLeft') skipTime(10);
  if(e.key === 'ArrowRight') skipTime(-10);
  if(e.key === 'ArrowUp'){ audio.volume = Math.min(1, audio.volume+0.1); }
  if(e.key === 'ArrowDown'){ audio.volume = Math.max(0, audio.volume-0.1); }
  if(e.key === 'm' || e.key === 'M'){ audio.muted = !audio.muted; }
});

// ═══ BOOT ═══
render();

// Preload RSS feeds in background
setTimeout(()=>{
  Object.keys(SHOWS).forEach(id => loadRSSForShow(id));
}, 1500);
</script>
